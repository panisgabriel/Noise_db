<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoiseSense – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="login-screen" class="screen active">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">🔊</div>
      <h1>Noise<span>Sense</span></h1>
    </div>
    <div id="login-err" class="login-err">Invalid credentials. Please try again.</div>
    <div class="mb16">
      <div class="field-label">Email</div>
      <input id="login-user" class="field" type="email" placeholder="admin@example.com" autocomplete="username">
    </div>
    <div class="mb24">
      <div class="field-label">Password</div>
      <input id="login-pass" class="field" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="btn-signin" onclick="doLogin()">Sign in →</button>
    <div class="login-demo">
      <div class="demo-label">Quick demo accounts</div>
      <div class="demo-btn" onclick="fillDemo('admin@example.com','admin123')">🔑 Admin<br><span style="color:var(--accent)">admin123</span></div>
      <div class="demo-btn" onclick="fillDemo('manager@example.com','manager123')">📊 Manager<br><span style="color:var(--accent)">manager123</span></div>
      <div class="demo-btn" onclick="fillDemo('user@example.com','user123')">👤 User<br><span style="color:var(--accent)">user123</span></div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────
const API = 'api'; // base path — adjust if you host api/ elsewhere

// ── Helpers ───────────────────────────────────────────────────
function fillDemo(u, p) {
  document.getElementById('login-user').value = u;
  document.getElementById('login-pass').value = p;
}

function showErr(msg) {
  const el = document.getElementById('login-err');
  el.textContent = msg || 'Invalid credentials. Please try again.';
  el.style.display = 'block';
}

function hideErr() {
  document.getElementById('login-err').style.display = 'none';
}

function setLoading(loading) {
  const btn = document.getElementById('btn-signin');
  btn.disabled   = loading;
  btn.textContent = loading ? 'Signing in…' : 'Sign in →';
}

// ── Login ─────────────────────────────────────────────────────
async function doLogin() {
  const email    = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;

  if (!email || !password) {
    showErr('Please enter your email and password.');
    return;
  }

  hideErr();
  setLoading(true);

  try {
    const res  = await fetch(`${API}/login.php`, {
      method:      'POST',
      credentials: 'include',          // send/receive cookies
      headers:     { 'Content-Type': 'application/json' },
      body:        JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if (!data.ok) {
      showErr(data.error || 'Invalid credentials.');
      setLoading(false);
      return;
    }

    // Store minimal session info in sessionStorage (no passwords, no sensitive data)
    sessionStorage.setItem('ns_user', JSON.stringify(data.user));
    sessionStorage.setItem('ns_token', data.token);  // also in cookie, kept for JS fetch headers

    // Redirect by role
    const dest = { admin: 'admin.html', manager: 'manager.html', user: 'user.html' };
    window.location.href = dest[data.user.role] ?? 'index.html';

  } catch (err) {
    console.error(err);
    showErr('Could not reach the server. Please try again.');
    setLoading(false);
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
